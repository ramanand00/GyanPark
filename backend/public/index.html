<!DOCTYPE html>
<html>
<head>
    <title>GyanPark Backend</title>
    <style>
        body{
            margin:0;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:linear-gradient(135deg,#4f46e5,#7c3aed);
            font-family:Arial,sans-serif;
        }

        .card{
            background:white;
            padding:40px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 10px 30px rgba(0,0,0,.2);
        }

        .dot{
            width:100px;
            height:100px;
            background:#22c55e;
            border-radius:50%;
            margin:auto;
            animation:pulse 1.5s infinite;
        }

        @keyframes pulse{
            0%{transform:scale(1);}
            50%{transform:scale(1.1);}
            100%{transform:scale(1);}
        }

        h1{
            color:#333;
        }

        p{
            color:#666;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="dot"></div>
        <h1>🚀 GyanPark Backend Running</h1>
        <p>Server is online and accepting requests.</p>
    </div>
</body>
</html>
